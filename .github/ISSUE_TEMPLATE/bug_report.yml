name: Bug report
description: Report a reproducible Poolstatis bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, request payloads, screenshots, or a minimal repo when useful.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Ingest API
        - Platform API
        - MCP server
        - SDK
        - Admin SPA
        - Site/docs
        - Other
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Checks already run
      description: Paste exact commands and results. Do not paste secrets.
